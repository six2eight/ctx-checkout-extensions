  "https://ctx-checkout-extensions.vercel.app/auth/callback",
  "https://ctx-checkout-extensions.vercel.app/auth/shopify/callback",
  "https://ctx-checkout-extensions.vercel.app/api/auth/callback"
]

[build]
automatically_update_urls_on_dev = true
